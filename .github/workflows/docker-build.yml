name: Build and Push Docker Image

on:
push:
branches:
- main

permissions:
contents: read
packages: write

jobs:
docker:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Convert owner to lowercase
    run: |
      echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

  - name: Login to GHCR
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  - name: Build Image
    run: |
      docker build \
        -t ghcr.io/${OWNER_LC}/healthcare-ai-assistant:latest \
        .

  - name: Push Image
    run: |
      docker push \
        ghcr.io/${OWNER_LC}/healthcare-ai-assistant:latest
```
